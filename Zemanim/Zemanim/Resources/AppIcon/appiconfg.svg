<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" aria-hidden="true">
  <!-- Clock circle -->
  <circle cx="24" cy="24" r="12" fill="none" stroke="#FFFFFF" stroke-width="2" />

  <!-- Star of David (two overlapping triangles) -->
  <g fill="#FFFFFF" stroke="none" transform="translate(0,0)">
	<!-- Equilateral triangles centered at (24,24) -->
	<polygon points="24,14 32.660254,29 15.339746,29" />
	<polygon points="24,34 15.339746,19 32.660254,19" />
  </g>

  <!-- Clock hands -->
  <g stroke="#0D6EFD" stroke-width="2" stroke-linecap="round" fill="none">
	<!-- Minute hand (white background shows circle, use blue hands for contrast) -->
	<line x1="24" y1="24" x2="24" y2="14" />
	<!-- Hour hand -->
	<line x1="24" y1="24" x2="30" y2="24" />
  </g>

  <!-- Center dot (blue) -->
  <circle cx="24" cy="24" r="1.5" fill="#0D6EFD" />
</svg>
